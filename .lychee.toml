# equivalent van: --include-fragments
include_fragments = true   # :contentReference[oaicite:1]{index=1}

# equivalent van: -v (kies loglevel)
verbose = "error"          # "error"|"warn"|"info"|"debug"|"trace" :contentReference[oaicite:2]{index=2}

# equivalent van: -p ./lychee-preprocess.sh
preprocess = { command = "./lychee-preprocess.sh" }  # :contentReference[oaicite:3]{index=3}

# voorbeeld: exclude een paar mappen (paths), regex
exclude_path = [
  "(^|/)technical/consumers-and-profiles",    # hele map skippen
  "(^|/)_media/",          # hele map skippen
]                          # :contentReference[oaicite:4]{index=4}

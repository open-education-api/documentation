# This workflow checks all links in the documentation using Lychee.

name: Lychee

on:
  pull_request:
    branches:
      - main
      - release/*

jobs:
  lychee:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository.
      - uses: actions/checkout@v6

      - name: Test MORA
        run: |
          curl -I -L -v https://mbodigitaal.nl/mora/

      # Check documentation links with Lychee.
      - uses: lycheeverse/lychee-action@v2
        if: github.base_ref != 'release/5.0'
        with:
          args: --verbose --include-fragments --timeout 60 -p ./lychee-preprocess.sh --root-dir documentation documentation
          
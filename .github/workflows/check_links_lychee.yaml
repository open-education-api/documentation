# This workflow checks all links in the documentation using Lychee.

name: Lychee

on:
  pull_request:
    branches:
      - main
      - release/*
    branches-ignore:
      - release/5.0

jobs:
  lychee:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository.
      - uses: actions/checkout@v4

      # Check documentation links with Lychee.
      - uses: lycheeverse/lychee-action@v1
        with:
          args: --include-fragments -p ./lychee-preprocess.sh documentation
          
# This workflow runs markdownlint on the documentation.

name: Markdown lint

on:
  pull_request:
    branches:
      - main
      - release/*

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout the repository.
      - uses: actions/checkout@v6

      # Run markdownlint on all documentation files.
      - name: Run markdownlint-cli2
        if: github.base_ref != 'release/5.0'
        run: npx markdownlint-cli2 "documentation/**"
        
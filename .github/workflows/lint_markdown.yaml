name: Markdown lint

on:
  pull_request:
    branches:
      - main
      - release/*

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        run: npx markdownlint-cli2 "documentation/**"
# This workflow publishes documentation for a release branch to the
# open-education-api.github.io repository under the corresponding version folder.

name: Publish documentation to open-education-api.github.io (release branches)

on:
  push:
    branches:
      - "release/*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout this repository containing the documentation.
      - uses: actions/checkout@v6

      # Extract the version from the branch name and derive source folder and site path.
      - name: Determine variables for version, source folder, etc
        id: release
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#release/}"
          MAJOR="${VERSION%%.*}"

          # Specialities for version v5
          if [[ "$MAJOR" == "5" ]]; then
            SITE_PATH="v5"
            SOURCE_FOLDER="v5"
          else
            SITE_PATH="v${VERSION}"
            SOURCE_FOLDER="documentation"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SOURCE_FOLDER=${SOURCE_FOLDER}" >> "$GITHUB_ENV"
          echo "SITE_PATH=${SITE_PATH}" >> "$GITHUB_ENV"

      # Create a GitHub App token used to push to the publication repository.
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.OEAPI_APP_PUBLISH_CLIENT_ID }}
          private-key: ${{ secrets.OEAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            open-education-api.github.io

      # Checkout the documentation website repository.
      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: open-education-api/open-education-api.github.io
          token: ${{ steps.app-token.outputs.token }}
          path: target

      # Copy documentation to the versioned folder of the website repository.
      - name: Sync documentation to versioned folder
        run: |
          set -euo pipefail
          mkdir -p "target/$SITE_PATH"
          rsync -a --delete "$SOURCE_FOLDER/" "target/$SITE_PATH/"

      # Commit and push only when the sync introduced changes.
      - name: Commit and push if there are changes
        run: |
          set -euo pipefail
          cd target
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Publish documentation for release $SITE_PATH"
            git push
          else
            echo "No changes to publish."
          fi
          
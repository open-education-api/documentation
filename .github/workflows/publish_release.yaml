# This workflow publishes documentation for a release branch to the
# open-education-api.github.io repository under the corresponding version folder.

name: Publish documentation to open-education-api.github.io (release branches)

on:
  push:
    branches:
      - "release/*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout this repository containing the documentation.
      - uses: actions/checkout@v4

      # Extract the version from the branch name (release/x.y → x.y).
      - name: Determine release version
        id: release
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#release/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Create a GitHub App token used to push to the publication repository.
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOAPI_APP_PUBLISH_ID }}
          private-key: ${{ secrets.OOAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            open-education-api.github.io

      # Checkout the documentation website repository.
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: open-education-api/open-education-api.github.io
          token: ${{ steps.app-token.outputs.token }}
          path: target

      # Copy documentation to the versioned folder of the website repository.
      - name: Sync documentation to versioned folder
        run: |
          set -euo pipefail
          mkdir -p "target/v${{ steps.release.outputs.version }}"
          rsync -a --delete documentation/ "target/v${{ steps.release.outputs.version }}/"

      # Commit and push only when the sync introduced changes.
      - name: Commit and push if there are changes
        run: |
          set -euo pipefail
          cd target
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Publish documentation for release v${{ steps.release.outputs.version }}"
            git push
          else
            echo "No changes to publish."
          fi
          